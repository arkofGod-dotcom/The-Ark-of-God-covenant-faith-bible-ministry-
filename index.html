<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE ARK OF GOD COVENANT FAITH BIBLE MINISTRY</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #000;
}

/* HEADER */
header {
    background: #1a237e;
    color: white;
    padding: 25px;
    text-align: center;
}

/* TRANSLATOR */
#google_translate_element {
    text-align: center;
    margin: 10px;
}

/* SECTIONS */
section {
    background: #ffffff;
    margin: 20px;
    padding: 25px;
    border-radius: 12px;
}

/* TITLES */
h2 {
    color: #1a237e;
    text-align: center;
}

/* BUTTON */
.btn {
    display: inline-block;
    background: green;
    color: white;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 6px;
}

/* GALLERY */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.gallery img {
    width: 250px;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>THE ARK OF GOD COVENANT FAITH BIBLE MINISTRY</h1>
</header>

<!-- TRANSLATOR -->
<div id="google_translate_element"></div>

<!-- ABOUT -->
<section>
<h2>About the Church</h2>
<p>This is not just a church but a movement of power, revival, and destiny transformation.</p>
</section>

<!-- DAILY BIBLE -->
<section>
<h2>Daily Bible Reading</h2>
<p id="bible">Loading...</p>
</section>

<!-- ONE YEAR -->
<section>
<h2>One Year Bible Reading Plan</h2>
<p id="plan">Loading...</p>
</section>

<!-- DEVOTIONAL -->
<section>
<h2>Daily Devotional</h2>
<p id="devotional">Loading...</p>
</section>

<!-- GALLERY -->
<section>
<h2>Photo Gallery</h2>
<div class="gallery">
<img src="YOUR_IMAGE_1.jpg">
<img src="YOUR_IMAGE_2.jpg">
<img src="YOUR_IMAGE_3.jpg">
<img src="YOUR_IMAGE_4.jpg">
<img src="YOUR_IMAGE_5.jpg">
</div>
</section>

<!-- CONTACT -->
<section>
<h2>Contact Us</h2>
<form action="https://formsubmit.co/YOUR-EMAIL@gmail.com" method="POST">
<input type="text" name="name" placeholder="Your Name" required><br><br>
<input type="email" name="email" placeholder="Your Email" required><br><br>
<textarea name="message" placeholder="Your Message" required></textarea><br><br>
<button type="submit" class="btn">Send Message</button>
</form>
</section>

<script>
// DAILY CONTENT ROTATION
const bible = [
"Isaiah 41:10 - Fear not, for I am with you.",
"Romans 8 - Life in the Spirit",
"Psalm 23 - The Lord is my shepherd"
];

const plan = [
"Genesis 1-3",
"Matthew 1-2",
"Psalms 1-5"
];

const devotional = [
"Favour will locate you.",
"You are stepping into a new dimension of grace.",
"Your breakthrough is here."
];

let i = 0;

setInterval(() => {
document.getElementById("bible").innerText = bible[i % bible.length];
document.getElementById("plan").innerText = plan[i % plan.length];
document.getElementById("devotional").innerText = devotional[i % devotional.length];
i++;
}, 3000);
</script>

<!-- GOOGLE TRANSLATOR -->
<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement({
pageLanguage: 'en',
includedLanguages: 'en,yo,ig,ha,fr,pt'
}, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
    </html>
